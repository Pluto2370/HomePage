<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rainbow</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Nunito:wght@400;600;700&display=swap">    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/setting.css">
</head>
<body>
    <!--设置按钮-->
    <button class="settings-btn" id="settingsBtn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
    </button>
    <!--设置页面-->
    <div class="settings-panel" id="settingsPanel">        <h4>设置</h4>
        <div class="settings-section">
            <div class="settings-row">
                <label class="settings-label">主背景色</label>
                <div class="gradient-colors-wrapper">
                    <div class="color-row">
                        <input type="color" id="gradColor1" class="color-input" value="#f6ede7">
                    </div>
                    <div class="color-row">
                        <input type="color" id="gradColor2" class="color-input" value="#e9fce4">
                    </div>
                    <div class="color-row">
                        <input type="color" id="gradColor3" class="color-input" value="#dffdfb">
                    </div>
                    <div class="color-row">
                        <input type="color" id="gradColor4" class="color-input" value="#e5e9fa">
                    </div>
                    <div class="color-row">
                        <input type="color" id="gradColor5" class="color-input" value="#facadc">
                    </div>
                    <button class="reset-bg-btn" id="resetBgBtn">默认</button>                </div>
            </div>
        </div>
        <div class="settings-section">
            <div class="settings-row">
                <label class="settings-label">时钟颜色</label>
                <div class="gradient-colors-wrapper">
                    <div class="color-row">
                        <input type="color" id="clockColor1" class="color-input" value="#ff4747">
                    </div>
                    <div class="color-row">
                        <input type="color" id="clockColor2" class="color-input" value="#ff942e">
                    </div>
                    <div class="color-row">
                        <input type="color" id="clockColor3" class="color-input" value="#c8de43">
                    </div>
                    <div class="color-row">
                        <input type="color" id="clockColor4" class="color-input" value="#449645">
                    </div>
                    <div class="color-row">
                        <input type="color" id="clockColor5" class="color-input" value="#3ec5ba">
                    </div>
                    <div class="color-row">
                        <input type="color" id="clockColor6" class="color-input" value="#4695ff">
                    </div>
                    <div class="color-row">
                        <input type="color" id="clockColor7" class="color-input" value="#d150e8">
                    </div>
                    <button class="reset-bg-btn" id="resetClockBtn">默认</button>                </div>
            </div>
        </div>
        <div class="settings-section">
            <div class="settings-row">
                <label class="settings-label">书签管理</label>
                <div class="gradient-colors-wrapper">
                    <button class="reset-bg-btn" id="exportBookmarksBtn">导出</button>
                    <button class="reset-bg-btn" id="importBookmarksBtn">导入</button>
                    <input type="file" id="importBookmarksFile" accept=".json" style="display:none">
                </div>
            </div>
        </div>
    </div>
    <!--时间-->
    <section class="clock-section" aria-label="当前时间">
        <time class="clock" id="clock" datetime=""></time>
    </section>
    <!--遮罩层-->
    <div class="overlay"></div>
    <!--搜索框-->
    <div class="search-container">
        <div class="search-box">
            <input type="text" class="search-input" placeholder="搜索 ....">
            <button class="search-btn" id="searchBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
        </div>
    </div>

    <!--书签-->
    <div class="bookmarks-container" id="bookmarks"></div>
    <!--添加书签表单-->
    <div class="add-bookmark-form" id="addForm">
        <input type="text" class="form-input" id="bookmarkName" placeholder="网站名称">
        <input type="text" class="form-input" id="bookmarkUrl" placeholder="网址">
        <div class="icon-input-row">
            <input type="text" class="form-input icon-input" id="bookmarkIcon" placeholder="图标（默认取首字）" maxlength="2">
        </div>
        <div class="form-buttons">
            <button class="form-btn confirm" id="confirmAddBtn">确定</button>
            <button class="form-btn cancel" id="cancelAddBtn">取消</button>
        </div>
    </div>
    <!--编辑书签表单-->
    <div class="edit-bookmark-form" id="editForm">
        <button class="form-btn edit-btn" id="editBookmarkBtn">修改</button>
        <button class="form-btn delete-btn" id="deleteBookmarkBtn">删除</button>
    </div>
    <!--底部谏言-->
    <footer class="footer-quote">
        <div>「</div><p id="quote"></p><div>」</div>
    </footer>
    <script src="js/main.js"></script>
</body>
</html>
